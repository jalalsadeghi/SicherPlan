services:
  postgres:
    image: postgres:16-alpine
    container_name: sicherplan-postgres
    environment:
      POSTGRES_DB: sicherplan
      POSTGRES_USER: sicherplan
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicherplan -d sicherplan"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: sicherplan-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: sicherplan-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data:
