name: Stage Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_hr_baseline_backfill:
        description: "Run explicit HR baseline backfill after deploy"
        type: boolean
        default: false
      hr_baseline_tenant_id:
        description: "Tenant UUID for single-tenant HR baseline backfill"
        type: string
        required: false
      hr_baseline_all_tenants:
        description: "Backfill all active tenants. Requires confirmation string."
        type: boolean
        default: false
      hr_baseline_confirmation:
        description: "Required only for all-tenant backfill: RUN_ALL_TENANTS"
        type: string
        required: false

permissions:
  contents: read
  packages: write

# Keep deployments serialized so two pushes do not race on the same stage host.
concurrency:
  group: stage-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  DEPLOY_ROOT: /opt/sicherplan-stage
  STAGE_ENV_FILE: /opt/sicherplan-stage/config/stage.env
  BACKEND_ENV_FILE: /opt/sicherplan-stage/config/backend.stage.env

jobs:
  build_backend:
    name: Build Backend Stage Image
    runs-on: ubuntu-latest
    steps:
      # Each image build is isolated so backend and web can fail independently.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Smoke test field_dictionary_export import
        working-directory: backend
        run: |
          python - <<'PY'
          from app.modules.assistant.field_dictionary_export import main
          print("field_dictionary_export import ok")
          PY

      - name: Verify field/lookup corpus export is deterministic
        working-directory: backend
        run: |
          python -m app.modules.assistant.field_lookup_corpus_artifact \
            check-deterministic \
            --repo-root ..

      - name: Generate current field/lookup corpus artifact for stage image
        working-directory: backend
        run: |
          python -m app.modules.assistant.field_lookup_corpus_artifact \
            ensure-current \
            --repo-root ..

      - name: Summarize regenerated field/lookup corpus artifact
        run: |
          if ! git diff --quiet -- backend/app/modules/assistant/generated/field_lookup_corpus.json; then
            echo "Stage deploy refreshed backend/app/modules/assistant/generated/field_lookup_corpus.json for the image build."
            git diff --stat -- backend/app/modules/assistant/generated/field_lookup_corpus.json
          else
            echo "Committed field/lookup corpus artifact was already current."
          fi

      - name: Normalize image namespace for GHCR
        id: image_namespace
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # Buildx gives deterministic container builds and works well with GHCR pushes.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend stage image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.stage
          load: true
          tags: sicherplan-backend-smoke:${{ github.sha }}

      - name: Smoke test backend image field/lookup corpus
        run: |
          docker run --rm sicherplan-backend-smoke:${{ github.sha }} python - <<'PY'
          from importlib.resources import files
          from app.modules.assistant.field_dictionary import (
              detect_field_or_lookup_signal,
              field_definition_counts_by_module,
          )

          path = files("app.modules.assistant.generated").joinpath("field_lookup_corpus.json")
          print(path)
          print(path.is_file())
          print(field_definition_counts_by_module())
          assert detect_field_or_lookup_signal("was bedeutet Vertragsreferenz") is not None
          assert detect_field_or_lookup_signal("was bedeutet Rechtlicher Name") is not None
          assert detect_field_or_lookup_signal("was bedeutet Apfelkuchen") is None
          PY

      - name: Build and push backend stage image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.stage
          push: true
          tags: |
            ghcr.io/${{ steps.image_namespace.outputs.value }}/sicherplan-backend:main
            ghcr.io/${{ steps.image_namespace.outputs.value }}/sicherplan-backend:${{ github.sha }}

  build_web:
    name: Build Web Stage Image
    runs-on: ubuntu-latest
    steps:
      # The web image is built separately so stage can roll backend/web independently if needed.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace for GHCR
        id: image_namespace
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The current stage image serves committed dist assets directly, so fail here
      # with a clear message before Docker starts if the checked-in dist is absent.
      - name: Verify committed web dist exists for stage build
        run: |
          test -f web/apps/web-antd/dist/index.html || {
            echo "Current stage frontend build expects committed dist assets at web/apps/web-antd/dist/index.html in the checked-out repository." >&2
            echo "Commit dist for the current stage strategy, or later switch stage back to a full workspace build once that path is intentionally restored." >&2
            exit 1
          }

      - name: Build and push web stage image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile.stage
          push: true
          tags: |
            ghcr.io/${{ steps.image_namespace.outputs.value }}/sicherplan-web:main
            ghcr.io/${{ steps.image_namespace.outputs.value }}/sicherplan-web:${{ github.sha }}

  deploy_stage:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs:
      - build_backend
      - build_web
    steps:
      # Checkout is needed only to collect the current compose file and remote deploy script.
      - name: Checkout
        uses: actions/checkout@v4

      # Package the exact deployment artifacts that must overwrite the server copy on each deploy.
      - name: Prepare deployment bundle
        run: |
          rm -rf /tmp/sicherplan-stage-deploy
          mkdir -p /tmp/sicherplan-stage-deploy
          cp infra/docker-compose.stage.yml /tmp/sicherplan-stage-deploy/docker-compose.stage.yml
          cp infra/scripts/deploy_stage_remote.sh /tmp/sicherplan-stage-deploy/deploy_stage_remote.sh

      # Use SSH key auth only; the known_hosts secret pins the server host key.
      - name: Configure SSH key and known hosts
        env:
          STAGE_SSH_KEY: ${{ secrets.STAGE_SSH_KEY }}
          STAGE_KNOWN_HOSTS: ${{ secrets.STAGE_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$STAGE_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$STAGE_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # The server never needs a git clone. It only needs the deploy directory and config files.
      - name: Ensure remote deployment directory exists
        env:
          STAGE_HOST: ${{ secrets.STAGE_HOST }}
          STAGE_PORT: ${{ secrets.STAGE_PORT }}
          STAGE_USER: ${{ secrets.STAGE_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$STAGE_PORT" "$STAGE_USER@$STAGE_HOST" \
            "install -d '$DEPLOY_ROOT/deploy'"

      # Copy the current compose and deploy script so the server always runs the repo's latest deploy logic.
      - name: Copy compose and deploy script to the server
        env:
          STAGE_HOST: ${{ secrets.STAGE_HOST }}
          STAGE_PORT: ${{ secrets.STAGE_PORT }}
          STAGE_USER: ${{ secrets.STAGE_USER }}
        run: |
          scp -i ~/.ssh/id_ed25519 -P "$STAGE_PORT" \
            /tmp/sicherplan-stage-deploy/docker-compose.stage.yml \
            "$STAGE_USER@$STAGE_HOST:$DEPLOY_ROOT/deploy/docker-compose.stage.yml"
          scp -i ~/.ssh/id_ed25519 -P "$STAGE_PORT" \
            /tmp/sicherplan-stage-deploy/deploy_stage_remote.sh \
            "$STAGE_USER@$STAGE_HOST:$DEPLOY_ROOT/deploy/deploy_stage_remote.sh"

      # Run the remote deployment with the required runtime paths and GHCR credentials injected at execution time.
      - name: Run remote stage deployment
        env:
          STAGE_HOST: ${{ secrets.STAGE_HOST }}
          STAGE_PORT: ${{ secrets.STAGE_PORT }}
          STAGE_USER: ${{ secrets.STAGE_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          RUN_HR_BASELINE_BACKFILL: ${{ github.event_name == 'workflow_dispatch' && inputs.run_hr_baseline_backfill || 'false' }}
          HR_BASELINE_TENANT_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.hr_baseline_tenant_id || '' }}
          HR_BASELINE_ALL_TENANTS: ${{ github.event_name == 'workflow_dispatch' && inputs.hr_baseline_all_tenants || 'false' }}
          HR_BASELINE_CONFIRMATION: ${{ github.event_name == 'workflow_dispatch' && inputs.hr_baseline_confirmation || '' }}
        run: |
          if [[ "$RUN_HR_BASELINE_BACKFILL" == "true" ]]; then
            if [[ -n "$HR_BASELINE_TENANT_ID" && "$HR_BASELINE_ALL_TENANTS" == "true" ]]; then
              echo "Choose either hr_baseline_tenant_id or hr_baseline_all_tenants=true, not both." >&2
              exit 1
            fi
            if [[ -z "$HR_BASELINE_TENANT_ID" && "$HR_BASELINE_ALL_TENANTS" != "true" ]]; then
              echo "Backfill requested, but neither hr_baseline_tenant_id nor hr_baseline_all_tenants=true was provided." >&2
              exit 1
            fi
            if [[ "$HR_BASELINE_ALL_TENANTS" == "true" && "$HR_BASELINE_CONFIRMATION" != "RUN_ALL_TENANTS" ]]; then
              echo "All-tenant backfill requires hr_baseline_confirmation=RUN_ALL_TENANTS." >&2
              exit 1
            fi
          fi
          DEPLOY_ROOT_Q=$(printf '%q' "$DEPLOY_ROOT")
          STAGE_ENV_FILE_Q=$(printf '%q' "$STAGE_ENV_FILE")
          BACKEND_ENV_FILE_Q=$(printf '%q' "$BACKEND_ENV_FILE")
          GHCR_USERNAME_Q=$(printf '%q' "$GHCR_USERNAME")
          GHCR_TOKEN_Q=$(printf '%q' "$GHCR_TOKEN")
          RUN_HR_BASELINE_BACKFILL_Q=$(printf '%q' "$RUN_HR_BASELINE_BACKFILL")
          HR_BASELINE_TENANT_ID_Q=$(printf '%q' "$HR_BASELINE_TENANT_ID")
          HR_BASELINE_ALL_TENANTS_Q=$(printf '%q' "$HR_BASELINE_ALL_TENANTS")
          HR_BASELINE_CONFIRMATION_Q=$(printf '%q' "$HR_BASELINE_CONFIRMATION")
          ssh -i ~/.ssh/id_ed25519 -p "$STAGE_PORT" "$STAGE_USER@$STAGE_HOST" \
            "set -euo pipefail; \
             export DEPLOY_ROOT=$DEPLOY_ROOT_Q; \
             export STAGE_ENV_FILE=$STAGE_ENV_FILE_Q; \
             export BACKEND_ENV_FILE=$BACKEND_ENV_FILE_Q; \
             export GHCR_USERNAME=$GHCR_USERNAME_Q; \
             export GHCR_TOKEN=$GHCR_TOKEN_Q; \
             export RUN_HR_BASELINE_BACKFILL=$RUN_HR_BASELINE_BACKFILL_Q; \
             export HR_BASELINE_TENANT_ID=$HR_BASELINE_TENANT_ID_Q; \
             export HR_BASELINE_ALL_TENANTS=$HR_BASELINE_ALL_TENANTS_Q; \
             export HR_BASELINE_CONFIRMATION=$HR_BASELINE_CONFIRMATION_Q; \
             chmod +x \"\$DEPLOY_ROOT/deploy/deploy_stage_remote.sh\"; \
             bash \"\$DEPLOY_ROOT/deploy/deploy_stage_remote.sh\""
