name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend Lint And Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff alembic sqlalchemy psycopg[binary] fastapi pydantic httpx

      - name: Run backend checks
        run: ./infra/scripts/check_backend_ci.sh

  migration:
    name: Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sicherplan
          POSTGRES_USER: sicherplan
          POSTGRES_PASSWORD: change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sicherplan -d sicherplan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SP_ALEMBIC_DATABASE_URL: postgresql+psycopg://sicherplan:change-me@localhost:5432/sicherplan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install migration tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install alembic sqlalchemy psycopg[binary]

      - name: Run migration smoke
        run: ./infra/scripts/check_migration_ci.sh

  web:
    name: Web Config Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run web checks
        run: ./infra/scripts/check_web_ci.sh

  mobile:
    name: Mobile Config Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Run mobile checks
        run: ./infra/scripts/check_mobile_ci.sh
