name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Backend Lint And Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend tooling
        run: |
          python -m pip install --upgrade pip
          # Install the backend package itself so CI validates the same import/package path
          # used by Docker and Alembic, while keeping lint/test-only tools out of runtime deps.
          python -m pip install ./backend ruff httpx

      - name: Run backend checks
        run: ./infra/scripts/check_backend_ci.sh

  assistant_generated_artifact:
    name: Assistant Generated Artifact Freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify field/lookup corpus export is deterministic
        working-directory: backend
        run: |
          python -m app.modules.assistant.field_lookup_corpus_artifact \
            check-deterministic \
            --repo-root ..

      - name: Verify committed field/lookup corpus artifact is current
        working-directory: backend
        run: |
          python -m app.modules.assistant.field_lookup_corpus_artifact \
            check-committed \
            --repo-root ..

  migration:
    name: Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sicherplan
          POSTGRES_USER: sicherplan
          POSTGRES_PASSWORD: change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sicherplan -d sicherplan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SP_ALEMBIC_DATABASE_URL: postgresql+psycopg://sicherplan:change-me@localhost:5432/sicherplan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install migration tooling
        run: |
          python -m pip install --upgrade pip
          # Migration smoke must run against the installed backend package because Alembic
          # imports app models/settings from the package, not from an implicit PYTHONPATH.
          python -m pip install ./backend

      - name: Run migration smoke
        run: ./infra/scripts/check_migration_ci.sh

  web:
    name: Web Config Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run web checks
        run: ./infra/scripts/check_web_ci.sh

  mobile:
    name: Mobile Config Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Run mobile checks
        run: ./infra/scripts/check_mobile_ci.sh
